<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Store - All in One Service</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2, h3 { color: #38bdf8; text-align: center; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #334155; color: #38bdf8; padding: 10px; text-align: left; border-radius: 5px 5px 0 0; }
        td { border-bottom: 1px solid #334155; padding: 10px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        .buy-btn { width: 100%; background: #0ea5e9; color: white; border: none; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .buy-btn:active { transform: scale(0.95); }
        .channel-btn { display: block; text-align: center; background: #22c55e; color: white; text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Legend Store</h2>
        <p style="text-align: center; font-size: 13px; color: #94a3b8;">Game Top-up & Social Media Services</p>
        <a href="https://t.me/LegendOfLight_SQ" class="channel-btn">📢 Join Our Telegram Channel</a>
    </div>

    <div class="card">
        <h3>💰 ဈေးနှုန်းဇယား</h3>
        <table>
            <tr><th>ဝန်ဆောင်မှု</th><th>ဈေးနှုန်း</th></tr>
            <tr><td>86 Diamonds</td><td>2,400 K</td></tr>
            <tr><td>172 Diamonds</td><td>4,700 K</td></tr>
            <tr><td>TG Channel Member (1K)</td><td>3,500 K</td></tr>
        </table>
    </div>

    <div class="card">
        <h3>📝 အော်ဒါတင်ရန်</h3>
        <label>ဝန်ဆောင်မှု ရွေးချယ်ပါ</label>
        <select id="category">
            <option value="MLBB Diamond">MLBB Diamond</option>
            <option value="Telegram Member">Telegram Member</option>
            <option value="Facebook Follower">Facebook Follower</option>
        </select>

        <label>Game ID သို့မဟုတ် Link</label>
        <input type="text" id="userData" placeholder="ဥပမာ - 12345678 (1234)">

        <label>ပမာဏ (Amount)</label>
        <input type="text" id="amount" placeholder="ဥပမာ - 172 Dias / 1000 Follower">

        <button class="buy-btn" onclick="sendToTelegram()">Order အတည်ပြုမည်</button>
    </div>
</div>

<script>
function sendToTelegram() {
    // --- ထည့်သွင်းထားသော အချက်အလက်များ ---
    const token = "8721885309:AAG0aGjsB_2voyjyDdWjU_KDiRNNGfyVlF0"; 
    const chat_id = "8727691110";
    // ------------------------------------

    const category = document.getElementById('category').value;
    const userData = document.getElementById('userData').value;
    const amount = document.getElementById('amount').value;

    if(!userData || !amount) {
        alert("အချက်အလက်များကို ပြည့်စုံစွာ ဖြည့်ပေးပါ။");
        return;
    }

    const message = `🚀 *New Order Alert!*%0A------------------------%0A📦 *Service:* ${category}%0A🆔 *ID/Link:* ${userData}%0A📊 *Amount:* ${amount}%0A------------------------%0A⚡ _Legend Store App_`;

    const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${message}&parse_mode=Markdown`;

    fetch(url).then(response => {
        if (response.ok) {
            alert("Order တင်ခြင်း အောင်မြင်ပါသည်။ သင့် Bot ကို စစ်ဆေးကြည့်ပါ။");
        } else {
            alert("Order ပို့၍မရပါ။ Bot Token သို့မဟုတ် ID ကို ပြန်စစ်ပါ။");
        }
    }).catch(err => {
        alert("အင်တာနက် ချိတ်ဆက်မှု မရှိပါ။");
    });
}
</script>

</body>
</html>
