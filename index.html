        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Z3T SHOP - Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #6366f1; --accent: #a855f7; }
        body {
            background-image: linear-gradient(rgba(3, 7, 18, 0.94), rgba(3, 7, 18, 0.94)), url('./bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden;
        }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -10%, #1e1b4b 0%, transparent 60%); z-index: -1; }
        .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 28px; box-shadow: 0 20px 50px -15px rgba(0,0,0,0.8); }
        .neon-btn { background: linear-gradient(135deg, var(--neon), var(--accent)); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); border: none; }
        .price-card { background: #0f172a; border: 1.5px solid #1e293b; padding: 14px; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .price-card:hover { border-color: var(--neon); background: #1e1b4b; transform: translateY(-2px); }
        .price-card.selected { border: 2px solid var(--neon); background: rgba(99, 102, 241, 0.15); box-shadow: inset 0 0 15px rgba(99, 102, 241, 0.1); }
        .logo-anim { animation: float 4s ease-in-out infinite; box-shadow: 0 0 40px rgba(99, 102, 241, 0.3); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        #customAlert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; width: 85%; max-width: 320px; }
        #priceList::-webkit-scrollbar { width: 4px; }
        #priceList::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
        .ss-box { border: 2px dashed rgba(99, 102, 241, 0.3); transition: 0.3s; }
        .ss-box:hover { border-color: var(--neon); background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="p-5 pb-24">
    <div class="bg-glow"></div>

    <div id="customAlert" class="glass-card p-8 text-center border-indigo-500/50 shadow-2xl">
        <div id="alertIcon" class="text-4xl mb-3">⚠️</div>
        <p id="alertMsg" class="text-sm font-bold text-gray-200 mb-6"></p>
        <button onclick="closeAlert()" class="w-full py-3 neon-btn rounded-xl font-black text-xs uppercase text-white tracking-widest">OK</button>
    </div>

    <div class="max-w-md mx-auto relative z-10">
        <div class="text-center mb-8">
            <div class="relative inline-block mb-4">
                <img src="./logo.jpg" alt="Logo" class="w-24 h-24 rounded-full border-4 border-indigo-500/40 logo-anim object-cover shadow-2xl">
            </div>
            <h1 class="text-3xl font-extrabold italic uppercase text-white">I Z3T <span class="text-indigo-500">Shop</span></h1>
            <p class="text-[9px] font-black text-indigo-400 tracking-[0.4em] mt-2 opacity-70 uppercase">High Quality & Fast Service</p>
        </div>

        <div class="glass-card p-5 mb-5">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 mb-4 flex items-center">
                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full mr-2"></span> 01. Account Info
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="gameId" placeholder="User ID" class="w-full bg-[#030712] border border-slate-800 rounded-xl p-4 text-sm font-bold outline-none focus:border-indigo-500 text-white placeholder:text-gray-700">
                <input type="number" id="serverId" placeholder="(Server)" class="w-full bg-[#030712] border border-slate-800 rounded-xl p-4 text-sm font-bold outline-none focus:border-indigo-500 text-white placeholder:text-gray-700">
            </div>
        </div>

        <div class="glass-card p-5 mb-5">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 mb-4 flex items-center">
                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full mr-2"></span> 02. Select Package
            </h3>
            <div id="priceList" class="space-y-2 max-h-[350px] overflow-y-auto pr-1"></div>
        </div>

        <div class="glass-card p-5 mb-8">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 mb-4 flex items-center">
                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full mr-2"></span> 03. Payment Receipt
            </h3>
            <div class="grid grid-cols-2 gap-2 mb-4 text-center">
                <div class="bg-black/40 p-3 rounded-xl border border-slate-800/50">
                    <img src="./kpay.png" class="h-4 mx-auto mb-2" alt="KPay">
                    <p class="text-[9px] font-bold text-gray-300">09971941600</p>
                </div>
                <div class="bg-black/40 p-3 rounded-xl border border-slate-800/50">
                    <img src="./wave.png" class="h-4 mx-auto mb-2" alt="Wave">
                    <p class="text-[9px] font-bold text-gray-300">09799747004</p>
                </div>
            </div>
            <label class="ss-box flex flex-col items-center justify-center w-full py-6 rounded-2xl cursor-pointer bg-black/20">
                <div id="uploadPlaceholder" class="flex flex-col items-center">
                    <span class="text-2xl mb-1">📸</span>
                    <p class="text-[9px] font-black text-indigo-300 uppercase tracking-widest">Tap to Upload Screenshot</p>
                </div>
                <img id="preview" class="hidden w-24 h-24 object-cover rounded-xl border-2 border-indigo-500">
                <input type="file" id="ssInput" class="hidden" accept="image/*" onchange="previewImage(this)">
            </label>
        </div>

        <button id="submitBtn" onclick="sendToBot()" class="w-full py-5 neon-btn rounded-3xl font-black uppercase tracking-[0.3em] text-sm text-white active:scale-95 transition-all shadow-2xl">
            Confirm & Order
        </button>
    </div>

    <script>
        const diamondPrices = [
            { d: "Weekly Diamond Pass", p: 6500 },
            { d: 5, p: 600 }, { d: 11, p: 900 }, { d: 22, p: 1800 },
            { d: 55, p: 3700 }, { d: 86, p: 5300 }, { d: 110, p: 7200 },
            { d: 172, p: 10500 }, { d: 257, p: 15200 }, { d: 343, p: 20500 },
            { d: 429, p: 25500 }, { d: 514, p: 30500 }, { d: 600, p: 35500 },
            { d: 706, p: 41000 }, { d: 878, p: 51500 }, { d: 963, p: 56500 },
            { d: 1135, p: 66500 }, { d: 2195, p: 125000 }, { d: 3688, p: 205000 },
            { d: 5532, p: 310000 }, { d: 11483, p: 660000 }
        ];

        let selectedPlan = "";
        const listDiv = document.getElementById('priceList');

        diamondPrices.forEach(item => {
            const card = document.createElement('div');
            card.className = 'price-card flex justify-between items-center';
            card.innerHTML = `<div class="flex items-center space-x-3"><span class="text-lg">💎</span><p class="font-bold text-xs text-white">${item.d}</p></div><p class="font-black text-indigo-400 text-xs">${item.p.toLocaleString()} Ks</p>`;
            card.onclick = () => {
                document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedPlan = typeof item.d === 'string' ? item.d : `${item.d} Diamonds`;
            };
            listDiv.appendChild(card);
        });

        function previewImage(input) {
            const preview = document.getElementById('preview');
            const placeholder = document.getElementById('uploadPlaceholder');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.classList.remove('hidden'); placeholder.classList.add('hidden'); }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showAlert(msg, icon = "⚠️") { 
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('alertIcon').innerText = icon;
            document.getElementById('customAlert').style.display = 'block'; 
        }
        function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }

        async function sendToBot() {
            const gid = document.getElementById('gameId').value;
            const sid = document.getElementById('serverId').value;
            const ss = document.getElementById('ssInput').files[0];
            if(!gid || !sid || !selectedPlan || !ss) { showAlert("အချက်အလက်အားလုံးနှင့် Screenshot ထည့်ပေးပါဗျ!"); return; }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "SENDING..."; btn.disabled = true;

            const token = "8721885309:AAG0aGjsB_2voyjyDdWjU_KDiRNNGfyVlF0";
            const chat_id = "8727691110"; 

            try {
                const text = `🚀 *NEW BUY ORDER!* \n\n👤 *Game ID:* ${gid} (${sid})\n💎 *Plan:* ${selectedPlan}\n💰 *Status:* Screenshot Attached`;
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id, text, parse_mode: 'Markdown' })
                });

                const formData = new FormData();
                formData.append('chat_id', chat_id); formData.append('photo', ss);
                const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });

                if (response.ok) { showAlert("Order တင်ခြင်း အောင်မြင်ပါသည်!", "✅"); }
                else { showAlert("Error: Bot ကို Start အရင်နှိပ်ထားပါ။"); }
            } catch (error) { showAlert("Connection Error!"); }
            finally { btn.innerText = "CONFIRM & ORDER"; btn.disabled = false; }
        }
    </script>
</body>
</html>
