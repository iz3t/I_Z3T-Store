<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Z3T Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; color: #e2e8f0; margin: 0; overflow-x: hidden;
        }
        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* 🆕 Anime Cover & Header */
        .cover-img { 
            width: 100%; height: 200px; 
            object-fit: cover; border-radius: 20px 20px 0 0; 
            border: 2px solid rgba(56, 189, 248, 0.3); border-bottom: none;
        }
        .header { 
            text-align: center; padding: 25px 20px; 
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); 
            border-radius: 0 0 20px 20px; margin-bottom: 25px; 
            border: 2px solid rgba(56, 189, 248, 0.3); border-top: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }
        .header h2 { color: #38bdf8; margin: 0; letter-spacing: 3px; font-size: 30px; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 5px; font-weight: bold; }

        /* Grid System */
        .section-title { font-size: 16px; margin: 30px 0 15px 5px; color: #38bdf8; font-weight: bold; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px; }
        .section-title i { margin-right: 10px; font-size: 19px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .service-card { 
            background: #1e293b; border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .service-card:hover { transform: translateY(-10px) scale(1.02); border-color: #38bdf8; box-shadow: 0 15px 30px rgba(56, 189, 248, 0.25); }
        .service-card img { width: 100%; height: 130px; object-fit: cover; filter: brightness(0.9); transition: 0.4s; }
        .service-card:hover img { filter: brightness(1.1); }
        .service-card span { display: block; padding: 15px; text-align: center; font-weight: bold; font-size: 14px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Detail View (Hidden) */
        #detail-view { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f172a; z-index: 1000; overflow-y: auto; padding: 25px 20px; box-sizing: border-box;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .back-btn { background: rgba(56, 189, 248, 0.1); border: 1px solid #38bdf8; color: #38bdf8; padding: 10px 20px; border-radius: 12px; font-size: 15px; cursor: pointer; margin-bottom: 25px; transition: 0.3s; font-weight: bold; }
        .back-btn:hover { background: #38bdf8; color: #fff; }
        
        .price-list { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid rgba(56, 189, 248, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .price-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: 0.2s;
        }
        .price-item:last-child { border-bottom: none; }
        .price-item:hover { background: rgba(56, 189, 248, 0.15); }
        .price-item.selected { background: rgba(56, 189, 248, 0.25); border-left: 6px solid #38bdf8; color: #fff; }

        /* Form Styling */
        .order-form { margin-top: 35px; background: rgba(30, 41, 59, 0.6); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .order-form h4 { margin: 0 0 20px 0; color: #38bdf8; font-size: 20px; font-weight: bold; text-align: center; }
        label { font-size: 13px; color: #94a3b8; margin-left: 5px; font-weight: bold; }
        input { width: 100%; padding: 16px; margin: 10px 0 20px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .buy-btn { width: 100%; background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4); text-transform: uppercase; letter-spacing: 1px; }
        .buy-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="home-view" class="container">
    <img src="https://images.alphacoders.com/132/1327170.png" class="cover-img">
    
    <div class="header">
        <h2>1 Z3T Shop</h2>
        <p>FAST & RELIABLE DIGITAL SERVICES</p>
    </div>

    <div class="section-title"><i class="fas fa-gamepad"></i> Game Top-up</div>
    <div class="grid">
        <div class="service-card" onclick="openDetail('MLBB')">
            <img src="https://i.pinimg.com/736x/8a/85/37/8a853702113337f4460778c437172579.jpg">
            <span>Mobile Legends</span>
        </div>
        <div class="service-card" onclick="openDetail('FF')">
            <img src="https://i.pinimg.com/736x/48/8a/34/488a3493e8281e095d30968987b1c19b.jpg">
            <span>Free Fire</span>
        </div>
        <div class="service-card" onclick="openDetail('HOK')">
            <img src="https://i.pinimg.com/736x/8d/6d/4e/8d6d4e565985055b8e918c5750d45862.jpg">
            <span>Honor of Kings</span>
        </div>
        <div class="service-card" onclick="openDetail('PUBG')">
            <img src="https://i.pinimg.com/736x/07/20/0e/07200e4663a75871f3750059e6659f8a.jpg">
            <span>PUBG Mobile</span>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-users"></i> Social Media (DP) Services</div>
    <div class="grid">
        <div class="service-card" onclick="openDetail('Facebook')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" style="object-fit: contain; padding: 20px; background: #fff;">
            <span>Facebook Service</span>
        </div>
        <div class="service-card" onclick="openDetail('TikTok')">
            <img src="https://i.pinimg.com/736x/91/92/79/91927977469e3881452a2333069c9b63.jpg">
            <span>TikTok Service</span>
        </div>
        <div class="service-card" onclick="openDetail('Telegram')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" style="object-fit: contain; padding: 20px; background: #fff;">
            <span>Telegram Service</span>
        </div>
        <div class="service-card" onclick="openDetail('YouTube')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" style="object-fit: contain; padding: 20px; background: #fff;">
            <span>YouTube Service</span>
        </div>
    </div>
</div>

<div id="detail-view">
    <button class="back-btn" onclick="closeDetail()"><i class="fas fa-arrow-left"></i> Back to Home</button>
    <h3 id="detail-title" style="margin-bottom: 25px; color: #38bdf8; font-size: 22px;">Service Name</h3>
    
    <div class="price-list" id="price-container"></div>

    <div class="order-form">
        <h4><i class="fas fa-shopping-cart"></i> Order Form</h4>
        <label>Selected Package</label>
        <input type="text" id="selected-item" readonly placeholder="ရွေးချယ်ထားသော ပမာဏ">
        <label>Game ID / Profile Link</label>
        <input type="text" id="user-id" placeholder="ID (Server ID) / Link ကိုထည့်ပါ">
        <button class="buy-btn" onclick="sendOrder()">CONFIRM ORDER</button>
    </div>
</div>

<script>
const serviceData = {
    'MLBB': [
        { name: '86 Diamonds', price: '2,400 K' },
        { name: '172 Diamonds', price: '4,700 K' },
        { name: 'Weekly Pass', price: '5,500 K' }
    ],
    'FF': [
        { name: '110 Diamonds', price: '2,200 K' },
        { name: '231 Diamonds', price: '4,500 K' }
    ],
    'HOK': [
        { name: '80 Tokens', price: '2,300 K' },
        { name: '240 Tokens', price: '6,500 K' }
    ],
    'PUBG': [
        { name: '60 UC', price: '2,500 K' }
    ],
    'Facebook': [
        { name: '1000 Followers', price: '2,500 K' },
        { name: '1000 DP Likes', price: '2,800 K' }
    ],
    'TikTok': [
        { name: '1000 Likes', price: '2,000 K' }
    ],
    'Telegram': [
        { name: '1000 Members', price: '3,500 K' }
    ],
    'YouTube': [
        { name: '1000 Views', price: '4,000 K' }
    ]
};

function openDetail(service) {
    document.getElementById('detail-title').innerText = service + " PRICE LIST";
    const container = document.getElementById('price-container');
    container.innerHTML = "";

    serviceData[service].forEach(item => {
        const div = document.createElement('div');
        div.className = 'price-item';
        div.innerHTML = `<span>${item.name}</span><span style="color:#38bdf8; font-weight:bold;">${item.price}</span>`;
        div.onclick = function() {
            document.querySelectorAll('.price-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            document.getElementById('selected-item').value = service + " - " + item.name;
        };
        container.appendChild(div);
    });

    document.getElementById('home-view').style.display = "none";
    document.getElementById('detail-view').style.display = "block";
    window.scrollTo(0,0);
}

function closeDetail() {
    document.getElementById('detail-view').style.display = "none";
    document.getElementById('home-view').style.display = "block";
    document.getElementById('selected-item').value = "";
    document.getElementById('user-id').value = "";
}

function sendOrder() {
    const item = document.getElementById('selected-item').value;
    const id = document.getElementById('user-id').value;
    
    if(!item || !id) {
        Swal.fire({ icon: 'warning', title: 'Attention', text: 'အချက်အလက်များကို ပြည့်စုံစွာ ဖြည့်ပေးပါဗျ။', confirmButtonColor: '#38bdf8' });
        return;
    }

    const token = "8721885309:AAG0aGjsB_2voyjyDdWjU_KDiRNNGfyVlF0";
    const chat_id = "8727691110";
    const message = `🚀 *New Purchase Alert!*%0A------------------------%0A📦 *Item:* ${item}%0A🆔 *Target:* ${id}%0A💳 *Status:* Paid%0A------------------------%0A⚡ _1 Z3T Shop_`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${message}&parse_mode=Markdown`)
    .then(() => {
        Swal.fire({ icon: 'success', title: 'Success', text: 'အော်ဒါ ပို့ပြီးပါပြီ။ ခေတ္တစောင့်ဆိုင်းပေးပါ။', confirmButtonColor: '#22c55e' }).then(() => closeDetail());
    });
}
</script>

</body>
  </html>
