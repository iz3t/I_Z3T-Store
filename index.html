<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Z3T Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.alphacoders.com/132/1327170.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e2e8f0; margin: 0; overflow-x: hidden;
        }
        .container { max-width: 500px; margin: auto; padding: 15px; }

        .header { 
            text-align: center; padding: 25px 20px; 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px);
            border-radius: 20px; margin-bottom: 25px; 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            box-shadow: 0 10px 32px rgba(0,0,0,0.5); 
        }
        .header h2 { color: #38bdf8; margin: 0; letter-spacing: 3px; font-size: 28px; text-transform: uppercase; }

        .section-title { font-size: 14px; margin: 30px 0 15px 5px; color: #38bdf8; font-weight: bold; display: flex; align-items: center; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .service-card { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            border-radius: 18px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: 0.3s;
        }
        .service-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .img-container { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; }
        .service-card img { width: 100%; height: 100%; object-fit: cover; }
        .service-card span { display: block; padding: 12px 5px; text-align: center; font-weight: bold; font-size: 13px; }

        #detail-view { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.98); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .back-btn { background: rgba(56, 189, 248, 0.1); border: 1px solid #38bdf8; color: #38bdf8; padding: 10px 18px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        .price-list { background: rgba(30, 41, 59, 0.8); border-radius: 18px; overflow: hidden; border: 1px solid rgba(56, 189, 248, 0.3); }
        .price-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 16px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; 
        }
        .price-item.selected { background: rgba(56, 189, 248, 0.25); border-left: 5px solid #38bdf8; }

        /* 🆕 Payment Logo Styling */
        .pay-badges { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        .pay-logo { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; }

        .order-form { margin-top: 25px; background: rgba(30, 41, 59, 0.6); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        .buy-btn { width: 100%; background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="home-view" class="container">
    <div class="header">
        <h2>1 Z3T Shop</h2>
        <p>PREMIUM DIGITAL SOLUTIONS</p>
    </div>

    <div class="section-title"><i class="fas fa-gamepad"></i> Game Top-up</div>
    <div class="grid">
        <div class="service-card" onclick="openDetail('MLBB')">
            <div class="img-container"><img src="https://i.pinimg.com/736x/8a/85/37/8a853702113337f4460778c437172579.jpg"></div>
            <span>Mobile Legends</span>
        </div>
        <div class="service-card" onclick="openDetail('FF')">
            <div class="img-container"><img src="https://i.pinimg.com/736x/48/8a/34/488a3493e8281e095d30968987b1c19b.jpg"></div>
            <span>Free Fire</span>
        </div>
        <div class="service-card" onclick="openDetail('HOK')">
            <div class="img-container"><img src="https://i.pinimg.com/736x/8d/6d/4e/8d6d4e565985055b8e918c5750d45862.jpg"></div>
            <span>Honor of Kings</span>
        </div>
        <div class="service-card" onclick="openDetail('PUBG')">
            <div class="img-container"><img src="https://i.pinimg.com/736x/07/20/0e/07200e4663a75871f3750059e6659f8a.jpg"></div>
            <span>PUBG Mobile</span>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-share-alt"></i> Social Media</div>
    <div class="grid">
        <div class="service-card" onclick="openDetail('Facebook')">
            <div class="img-container" style="background:white;"><img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" style="object-fit: contain; padding: 10px;"></div>
            <span>Facebook</span>
        </div>
        <div class="service-card" onclick="openDetail('TikTok')">
            <div class="img-container"><img src="https://i.pinimg.com/736x/91/92/79/91927977469e3881452a2333069c9b63.jpg"></div>
            <span>TikTok</span>
        </div>
        <div class="service-card" onclick="openDetail('Instagram')">
            <div class="img-container" style="background:white;"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" style="object-fit: contain; padding: 15px;"></div>
            <span>Instagram</span>
        </div>
        <div class="service-card" onclick="openDetail('AlightMotion')">
            <div class="img-container"><img src="https://i.pinimg.com/736x/39/e0/7d/39e07d0781076b42b99f2a969966b08e.jpg"></div>
            <span>Alight Motion</span>
        </div>
    </div>
</div>

<div id="detail-view">
    <button class="back-btn" onclick="closeDetail()"><i class="fas fa-arrow-left"></i> Back</button>
    <h3 id="detail-title" style="color: #38bdf8;">Service</h3>
    <div class="price-list" id="price-container"></div>
    <div class="order-form">
        <input type="text" id="selected-item" readonly placeholder="Selected Package">
        <input type="text" id="user-id" placeholder="Account ID / Link">
        <button class="buy-btn" onclick="sendOrder()">CONFIRM ORDER</button>
    </div>
</div>

<script>
// 🆕 Logo Links
const kpayLogo = "https://play-lh.googleusercontent.com/S99qIInaZ_WshE0U369pYJtY76X7469yZ7y_FwG6X3B0I_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z"; // Kpay Logo
const waveLogo = "https://play-lh.googleusercontent.com/9v1M7Zf785v7qJ-46u9I_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z_Z"; // Wave Logo

const serviceData = {
    'MLBB': [{ name: '86 Diamonds', price: '2,400 K' }, { name: 'Weekly Pass', price: '5,500 K' }],
    'FF': [{ name: '110 Diamonds', price: '2,200 K' }, { name: '583 Diamonds', price: '11,000 K' }],
    'HOK': [{ name: '80 Tokens', price: '2,300 K' }, { name: 'Weekly Card', price: '3,500 K' }],
    'PUBG': [{ name: '60 UC', price: '2,500 K' }, { name: '325 UC', price: '12,000 K' }],
    'AlightMotion': [{ name: 'Premium Shared', price: '1,500 K' }, { name: 'Premium Private', price: '4,500 K' }],
    'Facebook': [{ name: 'Followers (1000)', price: '2,500 K' }, { name: 'Likes (1000)', price: '1,500 K' }],
    'TikTok': [{ name: 'Views (1000)', price: '500 K' }, { name: 'Followers (1000)', price: '5,500 K' }],
    'Instagram': [{ name: 'Followers (1000)', price: '2,500 K' }],
    'Telegram': [{ name: 'Members (1000)', price: '3,500 K' }]
};

function openDetail(service) {
    document.getElementById('detail-title').innerText = service + " PRICE LIST";
    const container = document.getElementById('price-container');
    container.innerHTML = "";
    serviceData[service].forEach(item => {
        const div = document.createElement('div');
        div.className = 'price-item';
        // 🆕 Kpay နဲ့ Wave Logo ပါအောင် ပြင်လိုက်ပါတယ်
        div.innerHTML = `
            <div>
                <div style="font-weight:bold;">${item.name}</div>
                <div class="pay-badges">
                    <img src="https://i.ibb.co/m0vB19b/kpay.png" class="pay-logo">
                    <img src="https://i.ibb.co/9v8X8V6/wave.png" class="pay-logo">
                    <span style="font-size:10px; color:#94a3b8;">Kpay / Wave</span>
                </div>
            </div>
            <span style="color:#38bdf8; font-weight:bold;">${item.price}</span>`;
        div.onclick = function() {
            document.querySelectorAll('.price-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            document.getElementById('selected-item').value = service + " - " + item.name;
        };
        container.appendChild(div);
    });
    document.getElementById('home-view').style.display = "none";
    document.getElementById('detail-view').style.display = "block";
}

function closeDetail() {
    document.getElementById('detail-view').style.display = "none";
    document.getElementById('home-view').style.display = "block";
}

function sendOrder() {
    const item = document.getElementById('selected-item').value;
    const id = document.getElementById('user-id').value;
    if(!item || !id) { Swal.fire('Attention', 'အချက်အလက် ပြည့်စုံအောင် ဖြည့်ပါဗျ', 'warning'); return; }

    const token = "8721885309:AAG0aGjsB_2voyjyDdWjU_KDiRNNGfyVlF0";
    const chat_id = "8727691110";
    const message = `🚀 *New Order!*%0A------------------------%0A📦 *Item:* ${item}%0A🆔 *Target:* ${id}%0A💳 *Status:* Paid%0A------------------------%0A⚡ _1 Z3T Shop_`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${message}&parse_mode=Markdown`)
    .then(() => { Swal.fire('Success', 'အော်ဒါ ပို့ပြီးပါပြီ ခင်ဗျာ။', 'success').then(() => closeDetail()); });
}
</script>

</body>
  </html>
