<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Z3T DIGITAL PRODUCT SELLER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .btn-order { background-color: #6366f1; transition: 0.3s; }
        .btn-order:hover { background-color: #4f46e5; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <div class="flex items-center space-x-3 mb-6">
            <div class="p-2 bg-indigo-500 rounded-lg">💎</div>
            <div>
                <h1 class="font-bold text-lg">Diamond Shop</h1>
                <p class="text-xs text-gray-400">Top up instantly</p>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4">Diamonds <span class="text-gray-500 text-sm font-normal">Active</span></h2>
        
        <div id="plans" class="space-y-3">
            </div>
    </div>

    <script>
        const plans = [
            { d: 5, p: "600 Ks" }, { d: 11, p: "900 Ks" }, { d: 22, p: "1,800 Ks" },
            { d: 55, p: "3,700 Ks" }, { d: 86, p: "5,300 Ks" }, { d: 110, p: "7,200 Ks" },
            { d: 172, p: "10,500 Ks" }, { d: 257, p: "15,200 Ks" }, { d: 343, p: "20,500 Ks" }
        ];

        const plansContainer = document.getElementById('plans');
        plans.forEach(item => {
            plansContainer.innerHTML += `
                <div class="card p-4 flex justify-between items-center">
                    <div>
                        <div class="font-bold">${item.d} Diamonds</div>
                        <div class="text-indigo-400 text-sm">${item.p}</div>
                    </div>
                    <button onclick="order('${item.d} Diamonds')" class="btn-order px-4 py-2 rounded-lg text-sm font-semibold">Order</button>
                </div>
            `;
        });

        function order(item) {
            // Bro ရဲ့ Telegram ဆီ တန်းပို့မယ့် Link (ဒါမှမဟုတ် Checkout Page)
            alert("Ordering " + item + "\nKPay: 09971941600\nWave: 09799747004");
        }
    </script>
</body>
</html>
