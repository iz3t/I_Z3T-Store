<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Z3T SHOP - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #6366f1; --accent: #a855f7; }
        body {
            /* Path ကို Folder နာမည်နဲ့ ပြန်ညှိထားပါတယ် */
            background-image: linear-gradient(rgba(3, 7, 18, 0.94), rgba(3, 7, 18, 0.94)), url('./bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -10%, #1e1b4b 0%, transparent 60%); z-index: -1; }
        .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 28px; box-shadow: 0 20px 50px -15px rgba(0,0,0,0.8); }
        .neon-btn { background: linear-gradient(135deg, var(--neon), var(--accent)); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); border: none; }
        .price-card { background: #0f172a; border: 1.5px solid #1e293b; padding: 16px; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .price-card:hover { border-color: var(--neon); background: #1e1b4b; transform: scale(1.02); }
        .price-card.selected { border: 2px solid var(--neon); background: rgba(99, 102, 241, 0.15); box-shadow: inset 0 0 20px rgba(99, 102, 241, 0.1); }
        .logo-anim { animation: float 4s ease-in-out infinite; box-shadow: 0 0 50px rgba(99, 102, 241, 0.3); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #customAlert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; width: 85%; max-width: 320px; }
    </style>
</head>
<body class="p-6 pb-24">
    <div class="bg-glow"></div>

    <div id="customAlert" class="glass-card p-8 text-center border-indigo-500/50 shadow-2xl">
        <div class="text-4xl mb-4">⚠️</div>
        <p class="text-sm font-bold text-gray-200 mb-6">အချက်အလက်အားလုံး ပြည့်စုံအောင် ဖြည့်ပေးပါဗျ!</p>
        <button onclick="closeAlert()" class="w-full py-3 neon-btn rounded-xl font-black text-xs uppercase text-white tracking-widest">OK</button>
    </div>

    <div class="max-w-md mx-auto relative z-10">
        <div class="text-center mb-12">
            <p class="text-[10px] font-black text-indigo-400 tracking-[0.6em] mb-4 opacity-80 uppercase">The King's Realm</p>
            <div class="relative inline-block mb-6">
                <img src="./logo.jpg" alt="Logo" class="w-28 h-28 rounded-full border-4 border-indigo-500/40 logo-anim object-cover shadow-2xl">
                <div class="absolute bottom-2 right-2 bg-green-500 w-5 h-5 rounded-full border-4 border-[#030712] animate-pulse"></div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tighter italic uppercase text-white">I Z3T <span class="text-indigo-500">Shop</span></h1>
        </div>

        <div class="glass-card p-6 mb-8">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-5 flex items-center">
                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full mr-2"></span> 01. Game Account
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="gameId" placeholder="User ID" class="w-full bg-[#030712] border-2 border-slate-800 rounded-2xl p-4 text-sm font-bold outline-none focus:border-indigo-500 transition-all text-white placeholder:text-gray-700">
                <input type="number" id="serverId" placeholder="(Server)" class="w-full bg-[#030712] border-2 border-slate-800 rounded-2xl p-4 text-sm font-bold outline-none focus:border-indigo-500 transition-all text-white placeholder:text-gray-700">
            </div>
        </div>

        <div class="glass-card p-6 mb-8">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-5 flex items-center">
                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full mr-2"></span> 02. Select Packages
            </h3>
            <div id="priceList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
        </div>

        <div class="glass-card p-6 mb-8">
            <h3 class="text-[10px] font-black text-center text-gray-500 uppercase tracking-widest mb-6">Official Payment</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-slate-800/50">
                    <img src="./kpay.png" class="h-6 rounded" alt="KPay">
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-300">09971941600</p>
                        <p class="text-[10px] text-indigo-400 font-black uppercase tracking-tighter">Khant Min Hein</p>
                    </div>
                </div>
                <div class="flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-slate-800/50">
                    <img src="./wave.png" class="h-6 rounded" alt="Wave">
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-300">09799747004</p>
                        <p class="text-[10px] text-indigo-400 font-black uppercase tracking-tighter">Khant Min Hein</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center">
            <button onclick="sendToTelegram()" class="w-full py-5 neon-btn rounded-3xl font-black uppercase tracking-[0.3em] text-sm text-white transition-all active:scale-95 shadow-indigo-500/20 shadow-2xl">
                Confirm & Order
            </button>
        </div>
    </div>

    <script>
        const diamondPrices = [
            { d: "Weekly Diamond Pass", p: 6500 },
            { d: 5, p: 600 }, { d: 11, p: 900 }, { d: 22, p: 1800 },
            { d: 55, p: 3700 }, { d: 86, p: 5300 }, { d: 110, p: 7200 },
            { d: 172, p: 10500 }, { d: 257, p: 15200 }, { d: 343, p: 20500 },
            { d: 429, p: 25500 }, { d: 514, p: 30500 }, { d: 600, p: 35500 },
            { d: 706, p: 41000 }, { d: 878, p: 51500 }, { d: 963, p: 56500 },
            { d: 1135, p: 66500 }, { d: 2195, p: 125000 }, { d: 3688, p: 205000 },
            { d: 5532, p: 310000 }, { d: 11483, p: 660000 }
        ];

        let selectedPlan = "";
        const listDiv = document.getElementById('priceList');

        diamondPrices.forEach(item => {
            const card = document.createElement('div');
            card.className = 'price-card flex justify-between items-center';
            card.innerHTML = `<div class="flex items-center space-x-4"><span class="text-xl">💎</span><div><p class="font-bold text-sm text-white">${item.d}</p><p class="text-[8px] text-gray-600 uppercase font-black tracking-widest">Diamonds</p></div></div><p class="font-black text-indigo-400 text-sm">${item.p.toLocaleString()} Ks</p>`;
            card.onclick = () => {
                document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedPlan = typeof item.d === 'string' ? item.d : `${item.d} Diamonds`;
            };
            listDiv.appendChild(card);
        });

        function showAlert() { document.getElementById('customAlert').style.display = 'block'; }
        function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }

        function sendToTelegram() {
            const gid = document.getElementById('gameId').value;
            const sid = document.getElementById('serverId').value;
            if(!gid || !sid || !selectedPlan) { showAlert(); return; }
            const msg = `🚀 NEW BUY ORDER!\n\n👤 Game ID: ${gid} (${sid})\n💎 Plan: ${selectedPlan}\n💰 Method: KPay/Wave`;
            window.location.href = `https://t.me/IZ3T_BOT?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
