<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Z3T Shop | Premium Top-up</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #0ea5e9;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: #020617 url('https://w.wallhaven.cc/full/2e/wallhaven-2e56e9.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #f8fafc;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.9) 100%); z-index: -1; }

        .container { max-width: 480px; margin: auto; padding: 20px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { 
            text-align: center; padding: 40px 20px; 
            background: var(--glass); backdrop-filter: blur(15px); 
            border-radius: 30px; border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            margin-bottom: 30px;
        }
        .header h2 { margin: 0; font-size: 32px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }

        .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px 10px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        
        .card { 
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 24px; border: 1px solid var(--border);
            overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        .img-box { width: 100%; aspect-ratio: 1/1; background: #fff; display: flex; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
        .card img { width: 100%; height: 100%; object-fit: contain; }
        .card .info { padding: 15px; text-align: center; font-weight: bold; font-size: 13px; background: rgba(15, 23, 42, 0.9); }

        /* Detail Modal */
        #pkg-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; overflow-y: auto; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); }
        
        .back-btn { background: var(--glass); border: 1px solid var(--primary); color: var(--primary); padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 10px; }

        .price-list { display: flex; flex-direction: column; gap: 10px; }
        .price-card { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            padding: 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .price-card:hover { background: rgba(255,255,255,0.08); }
        .price-card.selected { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

        /* Payment UI */
        .pay-box { background: var(--glass); border-radius: 24px; padding: 25px; margin: 25px 0; border: 1px dashed var(--primary); }
        .pay-title { font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--primary); margin-bottom: 20px; }
        .pay-item { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px; }
        .pay-item img { width: 35px; height: 35px; border-radius: 8px; }
        
        .form { background: var(--glass); padding: 25px; border-radius: 25px; border: 1px solid var(--border); }
        input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 15px; border: 1px solid #334155; background: #020617; color: white; outline: none; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        .submit-btn { width: 100%; background: linear-gradient(135deg, var(--accent), #2563eb); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); transition: 0.3s; }
        .submit-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container" id="home">
    <div class="header">
        <h2>1 Z3T Shop</h2>
    </div>

    <div class="section-title"><i class="fas fa-gamepad"></i> Game Top-Up</div>
    <div class="grid" id="game-grid"></div>
</div>

<div id="pkg-view">
    <div class="container">
        <button class="back-btn" onclick="closePkg()"><i class="fas fa-arrow-left"></i> BACK TO SHOP</button>
        <h3 id="display-title" style="margin-bottom: 20px; color: var(--primary);"></h3>
        
        <div class="price-list" id="price-container"></div>

        <div class="pay-box">
            <div class="pay-title">Payment Methods</div>
            <div class="pay-item">
                <img src="https://i.ibb.co/S769v70/kpay.png">
                <div><b>Kpay:</b> 09752671391</div>
            </div>
            <div class="pay-item">
                <img src="https://i.ibb.co/vYf9p9M/wave.png">
                <div><b>Wave:</b> 09752671391</div>
            </div>
            <small style="color: #94a3b8;">Please send exact amount and save screenshot.</small>
        </div>

        <div class="form">
            <input type="text" id="selected-pkg" readonly placeholder="Selected Item">
            <input type="text" id="player-id" placeholder="Enter Player ID / Link">
            <button class="submit-btn" onclick="confirmOrder()">PLACE ORDER NOW</button>
        </div>
    </div>
</div>

<script>
const services = [
    { id:'HOK', name:'Honor of Kings', img:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A8YJ7zO3-Xp5D5rA0a9W8I7M3u-M-KzXqA&s' },
    { id:'MLBB', name:'Mobile Legends', img:'https://upload.wikimedia.org/wikipedia/en/thumb/5/5c/Mobile_Legends_Bang_Bang_Logo.png/220px-Mobile_Legends_Bang_Bang_Logo.png' },
    { id:'PUBG', name:'PUBG Mobile', img:'https://w7.pngwing.com/pngs/351/728/png-transparent-pubg-mobile-logo-game-pubg-mobile-games-thumbnail.png' },
    { id:'FF', name:'Free Fire', img:'https://upload.wikimedia.org/wikipedia/en/2/21/Free_Fire_Logo.png' }
];

const database = {
    'HOK': [{n:'17 Tokens', p:'1,200'}, {n:'88 Tokens', p:'5,800'}, {n:'257 Tokens', p:'16,500'}, {n:'716 Tokens', p:'45,000'}],
    'MLBB': [{n:'Weekly Pass', p:'5,500'}, {n:'86 Diamonds', p:'4,300'}, {n:'172 Diamonds', p:'8,500'}, {n:'257 Diamonds', p:'12,500'}, {n:'706 Diamonds', p:'33,000'}],
    'PUBG': [{n:'60 UC', p:'3,200'}, {n:'325 UC', p:'15,000'}, {n:'660 UC', p:'29,000'}, {n:'1800 UC', p:'75,000'}],
    'FF': [{n:'100 Diamonds', p:'2,800'}, {n:'210 Diamonds', p:'5,500'}, {n:'530 Diamonds', p:'13,500'}, {n:'1080 Diamonds', p:'26,500'}]
};

function renderHome() {
    const grid = document.getElementById('game-grid');
    services.forEach(s => {
        grid.innerHTML += `
            <div class="card" onclick="openPkg('${s.id}', '${s.name}')">
                <div class="img-box"><img src="${s.img}"></div>
                <div class="info">${s.name}</div>
            </div>`;
    });
}
renderHome();

function openPkg(id, name) {
    document.getElementById('display-title').innerText = name;
    const container = document.getElementById('price-container');
    container.innerHTML = "";
    database[id].forEach(item => {
        container.innerHTML += `
            <div class="price-card" onclick="selectItem(this, '${id} - ${item.n}')">
                <span>${item.n}</span>
                <span style="color:var(--primary); font-weight:bold;">${item.p} MMK</span>
            </div>`;
    });
    document.getElementById('home').style.display = "none";
    document.getElementById('pkg-view').style.display = "block";
    window.scrollTo(0,0);
}

function selectItem(el, val) {
    document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('selected-pkg').value = val;
}

function closePkg() {
    document.getElementById('pkg-view').style.display = "none";
    document.getElementById('home').style.display = "block";
}

function confirmOrder() {
    const pkg = document.getElementById('selected-pkg').value;
    const id = document.getElementById('player-id').value;
    
    if(!pkg || !id) return Swal.fire('Error', 'Please select item and enter ID!', 'error');

    Swal.fire({
        title: 'Confirm Order?',
        text: `Item: ${pkg} | ID: ${id}`,
        showCancelButton: true,
        confirmButtonColor: '#0ea5e9',
        confirmButtonText: 'Confirm'
    }).then((res) => {
        if(res.isConfirmed) {
            fetch(`https://api.telegram.org/bot8721885309:AAG0aGjsB_2voyjyDdWjU_KDiRNNGfyVlF0/sendMessage?chat_id=8727691110&text=🎯 *NEW ORDER*%0A━━━━━━━━━━━━━━%0A📦 *Item:* ${pkg}%0A🆔 *ID:* ${id}&parse_mode=Markdown`)
            .then(() => {
                Swal.fire('Success!', 'Order sent! Please complete payment.', 'success');
                closePkg();
            });
        }
    });
}
</script>
</body>
  </html>
