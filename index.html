<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Z3T Shop | Premium Top-up</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #020617; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 0; }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .header { text-align: center; padding: 35px; background: var(--card); border-radius: 25px; border: 1px solid var(--primary); margin-bottom: 25px; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .img-box { width: 100%; aspect-ratio: 1/1; background: #fff; display: flex; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .card-name { padding: 12px; text-align: center; font-weight: bold; font-size: 13px; background: rgba(0,0,0,0.5); }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #020617; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .back-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .item { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid transparent; cursor: pointer; }
        .item.active { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .pay-box { background: var(--card); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px dashed var(--primary); }
        .pay-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; font-size: 14px; }
        .pay-row img { width: 30px; height: 30px; border-radius: 5px; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        .buy-btn { width: 100%; background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="home">
    <div class="header"><h2>1 Z3T Shop</h2></div>
    <div class="grid">
        <div class="card" onclick="openM('HOK')">
            <div class="img-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A8YJ7zO3-Xp5D5rA0a9W8I7M3u-M-KzXqA&s"></div>
            <div class="card-name">Honor of Kings</div>
        </div>
        <div class="card" onclick="openM('MLBB')">
            <div class="img-box"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/5c/Mobile_Legends_Bang_Bang_Logo.png/220px-Mobile_Legends_Bang_Bang_Logo.png"></div>
            <div class="card-name">Mobile Legends</div>
        </div>
        <div class="card" onclick="openM('PUBG')">
            <div class="img-box"><img src="https://w7.pngwing.com/pngs/351/728/png-transparent-pubg-mobile-logo-game-pubg-mobile-games-thumbnail.png"></div>
            <div class="card-name">PUBG Mobile</div>
        </div>
        <div class="card" onclick="openM('FF')">
            <div class="img-box"><img src="https://upload.wikimedia.org/wikipedia/en/2/21/Free_Fire_Logo.png"></div>
            <div class="card-name">Free Fire</div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="container">
        <button class="back-btn" onclick="closeM()">← BACK</button>
        <h3 id="m-title" style="color:var(--primary);"></h3>
        <div id="m-list"></div>
        <div class="pay-box">
            <div style="font-size:12px; font-weight:bold; color:var(--primary); margin-bottom:15px;">PAYMENT METHODS</div>
            <div class="pay-row"><img src="https://i.ibb.co/S769v70/kpay.png"> <span><b>Kpay:</b> 09752671391</span></div>
            <div class="pay-row"><img src="https://i.ibb.co/vYf9p9M/wave.png"> <span><b>Wave:</b> 09752671391</span></div>
        </div>
        <input type="text" id="sel-val" readonly placeholder="Selected Package">
        <input type="text" id="u-id" placeholder="Enter Player ID">
        <button class="buy-btn" onclick="send()">CONFIRM ORDER</button>
    </div>
</div>

<script>
const db = {
    'HOK': [{n:'17 Tokens', p:'1,200'}, {n:'88 Tokens', p:'5,800'}, {n:'716 Tokens', p:'45,000'}],
    'MLBB': [{n:'Weekly Pass', p:'5,500'}, {n:'86 Diamonds', p:'4,300'}, {n:'172 Diamonds', p:'8,500'}, {n:'706 Diamonds', p:'33,000'}],
    'PUBG': [{n:'60 UC', p:'3,200'}, {n:'325 UC', p:'15,000'}, {n:'660 UC', p:'29,000'}],
    'FF': [{n:'100 Diamonds', p:'2,800'}, {n:'530 Diamonds', p:'13,500'}, {n:'1080 Diamonds', p:'26,500'}]
};
function openM(id) {
    document.getElementById('m-title').innerText = id + " Packages";
    const list = document.getElementById('m-list');
    list.innerHTML = "";
    db[id].forEach(i => {
        list.innerHTML += `<div class="item" onclick="select(this, '${id} - ${i.n}')"><span>${i.n}</span><span style="color:var(--primary)">${i.p} MMK</span></div>`;
    });
    document.getElementById('home').style.display='none';
    document.getElementById('modal').style.display='block';
}
function select(el, v) {
    document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sel-val').value = v;
}
function closeM() { document.getElementById('modal').style.display='none'; document.getElementById('home').style.display='block'; }
function send() {
    const pkg = document.getElementById('sel-val').value;
    const id = document.getElementById('u-id').value;
    if(!pkg || !id) return Swal.fire('Error', 'Please select package and ID', 'error');
    fetch(`https://api.telegram.org/bot8721885309:AAG0aGjsB_2voyjyDdWjU_KDiRNNGfyVlF0/sendMessage?chat_id=8727691110&text=🎯 *ORDER:* ${pkg} | *ID:* ${id}&parse_mode=Markdown`)
    .then(() => { Swal.fire('Success', 'Order sent!', 'success'); closeM(); });
}
</script>
</body>
  </html>
